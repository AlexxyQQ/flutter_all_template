name: {{app_name.snakeCase()}}
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4
  flutter: ^3.38.5

dependencies:
  # ============================================================
  # 🎯 Core & UI Framework
  # ============================================================
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8 # iOS style icons
  flutter_screenutil: ^5.9.3 # Screen adaptation & responsive UI
  flutter_svg: ^2.2.3 # SVG rendering support
  upgrader: ^12.3.0 # Prompt users to upgrade app version
  google_fonts: ^8.0.0

  # ============================================================
  # 🏗️ Architecture & State Management
  # ============================================================
  flutter_bloc: ^9.1.1 # BLoC pattern for state management
  get_it: ^9.2.0 # Service Locator for DI
  injectable: ^2.7.1+4 # Code generator for GetIt
  equatable: ^2.0.8 # Value equality comparisons (helps Bloc)
  nested: any # Simplifies nested builder widgets
  fpdart: ^1.2.0 # Functional programming (Either, Option)

  # ============================================================
  # 🧭 Navigation & Routing
  # ============================================================
  auto_route: ^11.1.0 # Robust navigation package with code gen

  # ============================================================
  # 🌐 Networking & Connectivity
  # ============================================================
  dio: ^5.9.0 # Powerful HTTP client
  connectivity_plus: ^7.0.0 # Check internet connection status
  flutter_dotenv: ^6.0.0 # Load environment variables (.env)

  # ============================================================
  # 💾 Data, Storage & Serialization
  # ============================================================
  flutter_secure_storage: ^10.0.0 # Secure storage for keys/tokens
  json_annotation: ^4.9.0 # Annotations for JSON serialization
  jwt_decoder: ^2.0.1 # Decode JWT tokens

  # ============================================================
  # 📱 Device Features & Permissions
  # ============================================================
{{#use_permissions}}
  permission_handler: ^12.0.1 # Handle OS permissions
  geolocator: ^14.0.2 # Access GPS/Location services
  app_settings: ^7.0.0 # Open device settings from app
{{/use_permissions}}
  file_picker: ^10.3.8 # Native file explorer picker
  image_picker: ^1.2.1 # Pick images from gallery/camera

  # ============================================================
  # 🔔 Notifications & Firebase
  # ============================================================
{{#use_firebase}}
  firebase_core: ^4.4.0 # Core Firebase setup
  firebase_messaging: ^16.1.1 # FCM (Push Notifications)
{{/use_firebase}}
{{#use_notifications}}
  awesome_notifications: ^0.10.1 # Local notifications & custom sounds
{{/use_notifications}}

  # ============================================================
  # 🌍 Localization & Formatting
  # ============================================================
  easy_localization: ^3.0.8 # Internationalization (i18n) wrapper

  # ============================================================
  # 🧩 UI Components & Widgets
  # ============================================================
  calendar_date_picker2: ^2.0.1 # Advanced calendar widget

  # ============================================================
  # 🛠️ Utilities & Helpers
  # ============================================================
  logger: ^2.6.2 # Pretty console logging
  rxdart: ^0.28.0 # Reactive extensions (Streams)
  cached_network_image: ^3.4.1

dev_dependencies:
  # ============================================================
  # 🧪 Testing
  # ============================================================
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3 # Mocking library for unit tests
  bloc_test: ^10.0.0 # Testing helpers for BLoC
  network_image_mock: ^2.1.1 # Mock network images in widget tests

  # ============================================================
  # 🏗️ Code Generation (Build Runner)
  # ============================================================
  build_runner: ^2.7.1 # Orchestrates code generation
  injectable_generator: ^2.8.1 # Generates DI code for Injectable
  json_serializable: ^6.11.1 # Generates JSON serialization logic
  freezed: ^3.2.3 # Generates unions/data classes
  auto_route_generator: ^10.2.4 # Generates routing code
  flutter_gen_runner: ^5.12.0 # Generates assets/fonts references

  # ============================================================
  # 🧹 Linting & Quality Control
  # ============================================================
  flutter_lints: ^6.0.0 # Official Flutter lint rules
  custom_lint_builder: ^0.8.1 # Framework for creating custom lint rules
  app_custom_lints: # Custom lint rules from Git
    git:
      url: https://github.com/AlexxyQQ/custom_lints.git
      ref: main

# ============================================================
# 🎨 FlutterGen (Assets) Configuration
# ============================================================
flutter_gen:
  output: lib/config/constants/gen

flutter:
  uses-material-design: true

  # Asset directories
  assets:
    - env/
    - assets/icons/
    - assets/images/
    - assets/images/onboarding/
    - assets/videos/
    - assets/translations/
    - assets/lottie/

#============================================================
# 📜 Custom Scripts (via `rps`)
#  dart pub global activate rps
#  EG: rps clean
#============================================================
scripts:
  #============================================================
  # 🧹 Maintenance & Code Quality
  #============================================================
  get: flutter clean && flutter pub get
  clean: flutter clean && flutter pub get && dart fix --apply && dart format . &&flutter analyze && dart analyze && dart run custom_lint
  fix: dart fix --apply
  format: dart format .
  imports: dart run import_sorter:main
  analyze: flutter clean && flutter pub get && flutter analyze && dart analyze && dart run custom_lint

  #============================================================
  # 🧬 Code Generation
  #============================================================
  build: dart run build_runner clean && dart run build_runner build --delete-conflicting-outputs && rps gen
  watch: dart run build_runner clean && rps gen && dart run build_runner watch --delete-conflicting-outputs
  gen: dart run easy_localization:generate -S assets/translations -f keys -O lib/config/constants/gen -o locale_keys.g.dart
  icons: dart run splash_master create && dart run icons_launcher:create

  #============================================================
  # 📦 Build Commands (Non-Flavored)
  #============================================================
  build:web: flutter clean && flutter pub get && flutter build web --release
  build:windows: flutter clean && flutter pub get && flutter build windows --release
  build:macos: flutter clean && flutter pub get && flutter build macos --release
  build:linux: flutter clean && flutter pub get && flutter build linux --release
  build:apk: flutter clean && flutter pub get && flutter build apk --release
  build:appbundle: flutter clean && flutter pub get && flutter build appbundle --release
  build:ipa: flutter clean && flutter pub get && flutter build ipa --release
  build:archive: flutter clean && flutter pub get && flutter build xcarchive --release
